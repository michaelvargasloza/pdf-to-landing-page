<div class="app-layout">
  <header class="app-header">
    <div class="header-container">
      <div class="logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <span class="logo-text">PDFToLanding <span class="logo-badge">AI</span></span>
      </div>

      <div class="header-info">
        <span class="model-tag">AI Powered</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <app-hero-guide (onStart)="onStartUpload()"></app-hero-guide>

    <app-pdf-uploader 
      [isLoading]="isLoading" 
      [statusMessage]="statusMessage" 
      [errorMessage]="errorMessage"
      (fileSelected)="onFileSelected($event)"
    ></app-pdf-uploader>

    <app-landing-preview 
      *ngIf="generatedHtml" 
      [generatedHtml]="generatedHtml" 
      [markdownContent]="markdownContent"
      [pdfPageCount]="pdfPageCount"
      [pdfFileSize]="pdfFileSize"
    ></app-landing-preview>
  </main>

  <footer class="app-footer">
    <p>© 2026 PDFToLanding AI. Plataforma impulsada por Inteligencia Artificial.</p>
  </footer>
</div>
